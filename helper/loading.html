<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'unsafe-inline'; img-src 'self'; connect-src 'none'; object-src 'none'; media-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Excelsis Helper</title>
  <style>
    :root {
      --bg: #101317;
      --text: #edf2f7;
      --muted: #98a6b4;
      --cyan: #61c8ff;
      --line: #343e49;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 12px;
    }
    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid var(--line);
      border-top-color: var(--cyan);
      animation: spin 0.8s linear infinite;
    }
    .label {
      color: var(--muted);
      letter-spacing: 0.2px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="./icon-256.png" alt="">
    <div class="spinner"></div>
    <div class="label">Starting Excelsis Helper&hellip;</div>
  </div>
</body>
</html>
